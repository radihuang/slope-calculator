const fmt = (x, dp = 2) => {
  if (!isFinite(x)) return "∞";
  const r = Number(x.toFixed(dp));

};

function SlopeCalculator() {
  const [mode, setMode] = useState("forward"); // forward | reverse
  const [unit, setUnit] = useState("m");        // m / cm

  // 正算
  const [lenStr, setLenStr] = useState("6");
  const [riseStr, setRiseStr] = useState("0.06");
  const [lenType, setLenType] = useState("run"); // run 水平長度 / slope 斜距

  // 反算
  const [targetStr, setTargetStr] = useState("12");
  const [targetType, setTargetType] = useState("ratio"); // pct / ratio(1:n)
  const [knownDim, setKnownDim] = useState("run"); // run 已知水平長 / rise 已知高差
  const [knownStr, setKnownStr] = useState("3");
  const [copied, setCopied] = useState(false);
  const [figure, setFigure] = useState("board"); // none / board / car / chair

  const applyScenario = (s) => {
    setMode("reverse");
    setTargetType("ratio");
    setTargetStr(String(s.n));
    setKnownDim(s.known);
    setUnit(s.unit);
    setKnownStr(s.knownVal);
  };

  const eff = useMemo(() => {
    if (mode === "forward") {
      const len = parseFloat(lenStr);
      const rise = Math.abs(parseFloat(riseStr));
      if (!(len > 0) || !isFinite(rise)) return null;
      let run, slope;
      if (lenType === "run") { run = len; slope = Math.hypot(run, rise); }
      else { slope = len; if (rise > slope) return { invalid: true }; run = Math.sqrt(Math.max(slope * slope - rise * rise, 0)); }
      const pct = run > 0 ? (rise / run) * 100 : Infinity;
      const ratioN = rise > 0 ? run / rise : Infinity;
      const deg = (Math.atan2(rise, run) * 180) / Math.PI;
      return { run, rise, slope, pct, ratioN, deg, solved: null };
    } else {
      const t = parseFloat(targetStr);
      const known = Math.abs(parseFloat(knownStr));
      let pct;
      if (targetType === "pct") pct = t;
      else pct = t > 0 ? 100 / t : NaN; // 1:n
      if (!isFinite(pct) || pct < 0 || !isFinite(known)) return null;
      const ratio = pct / 100;
      let run, rise, solvedKey, solvedVal;
      if (knownDim === "run") { if (!(known > 0)) return null; run = known; rise = run * ratio; solvedKey = "rise"; solvedVal = rise; }
      else { if (!(known >= 0)) return null; rise = known; run = ratio > 0 ? rise / ratio : Infinity; solvedKey = "run"; solvedVal = run; }
      const slope = Math.hypot(run, rise);
      const ratioN = rise > 0 ? run / rise : Infinity;
      const deg = (Math.atan2(rise, run) * 180) / Math.PI;
      return { run, rise, slope, pct, ratioN, deg, solved: { key: solvedKey, val: solvedVal } };
    }
  }, [mode, lenStr, riseStr, lenType, targetStr, targetType, knownDim, knownStr]);

  const ok = eff && !eff.invalid;

  const fig = useMemo(() => {
    const W = 360, H = 180, pad = 30;
    const availW = W - 2 * pad, availH = H - 2 * pad - 6;
    if (!ok || !isFinite(eff.run)) return null;
    const ratio = eff.pct / 100;
    let triW, triH;
    if (ratio <= availH / availW) { triW = availW; triH = availW * ratio; }
    else { triH = availH; triW = ratio > 0 ? availH / ratio : availW; }
    triW = Math.max(triW, 2); triH = Math.max(triH, 0);
    const ax = pad, ay = H - pad, bx = ax + triW, by = ay, cx = bx, cy = by - triH;
    const r = 30, th = (eff.deg * Math.PI) / 180;
    const arc = `M ${ax + r} ${ay} A ${r} ${r} 0 0 0 ${ax + r * Math.cos(th)} ${ay - r * Math.sin(th)}`;
    return { W, H, ax, ay, bx, by, cx, cy, arc };
  }, [ok, eff]);

  const u = unit;
  const convU = (v) => `${isFinite(v) ? fmt(v, u === "cm" ? 1 : 3) : "∞"} ${u}`;

  const handleCopy = () => {
    if (!ok) return;
    const ratioTxt = isFinite(eff.ratioN) ? `1:${fmt(eff.ratioN, 1)}` : "水平";
    const line =
      `坡度 ${fmt(eff.pct, 2)}%｜${ratioTxt}｜${fmt(eff.pct * 10, 1)}‰｜${fmt(eff.deg, 2)}°` +
      `｜水平 ${convU(eff.run)}・高差 ${convU(eff.rise)}・斜距 ${convU(eff.slope)}`;
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1500); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(line).then(done).catch(() => fallbackCopy(line, done));
    } else {
      fallbackCopy(line, done);
    }
  };
  const fallbackCopy = (text, done) => {
    try {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta); done();
    } catch (e) { /* clipboard unavailable */ }
  };

  const regs = useMemo(() => {
    if (!ok || !isFinite(eff.run)) return null;
    const { run, pct, rise } = eff;
    const riseCm = unit === "cm" ? rise : rise * 100;

    let drain;
    if (pct >= 2) drain = { s: "ok", label: "達大洩 1/50" };
    else if (pct >= 1) drain = { s: "warn", label: "僅達小洩 1/100" };
    else drain = { s: "bad", label: "未達最小洩水" };
    const drainOver = pct > 4;

    const ramp = pct <= 100 / 6 ? { s: "ok", label: "符合 ≤1:6" } : { s: "bad", label: "超過 1:6" };

    let acc;
    if (pct <= 100 / 12) acc = { s: "ok", label: "符合 ≤1/12" };
    else {
      let allow;
      if (riseCm <= 3) allow = 50; else if (riseCm <= 5) allow = 20; else if (riseCm <= 20) allow = 10; else allow = 100 / 12;
      if (allow > 100 / 12 && pct <= allow) acc = { s: "warn", label: "僅符合放寬值" };
      else acc = { s: "bad", label: "超過規定" };
    }

    let ski;
    if (pct <= 25) ski = "綠線・初級";
    else if (pct <= 40) ski = "藍線・中級";
    else if (pct <= 60) ski = "黑線・高級";
    else ski = "雙黑・專家";

    return { drain, drainOver, ramp, acc, ski, run };
  }, [ok, eff, unit]);

  return (
    <div className="sc-wrap">
      <style>{CSS}</style>
      <div className="sc-shell">
        <div className="sc-head">
          <div className="sc-headL">
            <h1 className="sc-title">坡度計算機</h1>
            <span className="sc-sub">Slope / Grade · 工地 · 設計 · 滑雪</span>
          </div>
          <div className="sc-seg">
            <button data-on={mode === "forward"} onClick={() => setMode("forward")}>正算</button>
            <button data-on={mode === "reverse"} onClick={() => setMode("reverse")}>反算</button>
          </div>
        </div>
        <div className="sc-rule" />

        <div className="sc-scen">
          <span className="sc-scenLab">常用情境</span>
          {SCENARIOS.map((s) => (
            <button key={s.id} className="sc-chip sc-chip-scen" onClick={() => applyScenario(s)}>
              {s.label}
            </button>
          ))}
        </div>

        <div className="sc-grid">
          {/* 輸入 */}
          <div className="sc-panel">
            <p className="sc-eyebrow">{mode === "forward" ? "輸入 · Input" : "反算 · Solve for"}</p>

            {mode === "forward" ? (
              <>
                <div className="sc-field">
                  <div className="sc-label">
                    <span>長度</span>
                    <small>{lenType === "run" ? "horizontal run" : "slope length"}</small>
                  </div>
                  <div className="sc-inputrow">
                    <input className="sc-input" type="number" inputMode="decimal"
                      value={lenStr} onChange={(e) => setLenStr(e.target.value)} placeholder="0" />
                    <span className="sc-unit">{u}</span>
                  </div>
                  <div style={{ marginTop: 8 }}>
                    <div className="sc-seg">
                      <button data-on={lenType === "run"} onClick={() => setLenType("run")}>水平長度</button>
                      <button data-on={lenType === "slope"} onClick={() => setLenType("slope")}>斜距</button>
                    </div>
                  </div>
                </div>

                <div className="sc-field">
                  <div className="sc-label"><span>前後高差</span><small>rise / drop</small></div>
                  <div className="sc-inputrow">
                    <input className="sc-input" type="number" inputMode="decimal"
                      value={riseStr} onChange={(e) => setRiseStr(e.target.value)} placeholder="0" />
                    <span className="sc-unit">{u}</span>
                  </div>
                </div>
              </>
            ) : (
              <>
                <div className="sc-field">
                  <div className="sc-label">
                    <span>目標坡度</span>
                    <small>{targetType === "ratio" ? "1 : n" : "percent"}</small>
                  </div>
                  <div className="sc-inputrow">
                    {targetType === "ratio" && <span className="sc-pre">1 :</span>}
                    <input className="sc-input" type="number" inputMode="decimal"
                      value={targetStr} onChange={(e) => setTargetStr(e.target.value)} placeholder="0" />
                    <span className="sc-unit">{targetType === "ratio" ? "n" : "%"}</span>
                  </div>
                  <div style={{ marginTop: 8 }}>
                    <div className="sc-seg">
                      <button data-on={targetType === "ratio"} onClick={() => setTargetType("ratio")}>斜率 1:n</button>
                      <button data-on={targetType === "pct"} onClick={() => setTargetType("pct")}>百分比 %</button>
                    </div>
                  </div>
                  <div className="sc-presets">
                    {PRESETS.map((p) => (
                      <button key={p.n} className="sc-chip"
                        data-on={targetType === "ratio" && parseFloat(targetStr) === p.n}
                        onClick={() => { setTargetType("ratio"); setTargetStr(String(p.n)); }}
                        title={p.tip}>1/{p.n}</button>
                    ))}
                  </div>
                </div>

                <div className="sc-field">
                  <div className="sc-label"><span>已知</span></div>
                  <div className="sc-seg">
                    <button data-on={knownDim === "run"} onClick={() => setKnownDim("run")}>水平長度</button>
                    <button data-on={knownDim === "rise"} onClick={() => setKnownDim("rise")}>高差</button>
                  </div>
                  <div className="sc-inputrow" style={{ marginTop: 8 }}>
                    <input className="sc-input" type="number" inputMode="decimal"
                      value={knownStr} onChange={(e) => setKnownStr(e.target.value)} placeholder="0" />
                    <span className="sc-unit">{u}</span>
                  </div>
                </div>
              </>
            )}

            <div className="sc-field" style={{ marginTop: 14 }}>
              <div className="sc-label"><span>單位</span></div>
              <div className="sc-seg">
                <button data-on={unit === "m"} onClick={() => setUnit("m")}>公尺 m</button>
                <button data-on={unit === "cm"} onClick={() => setUnit("cm")}>公分 cm</button>
              </div>
            </div>

            {eff && eff.invalid && <p className="sc-err">高差不可大於斜距，請確認輸入。</p>}
          </div>

          {/* 結果 + 圖 */}
          <div className="sc-panel">
            <div className="sc-eyebrowRow">
              <p className="sc-eyebrow" style={{ margin: 0 }}>結果 · Output</p>
              <button className="sc-copy" data-done={copied} onClick={handleCopy} disabled={!ok}>
                {copied ? "已複製 ✓" : "複製結果"}
              </button>
            </div>
            <div className="sc-readouts">
              <div className="sc-ro">
                <div className="k">坡度</div>
                <div className="v">{ok ? fmt(eff.pct, 2) : "—"}</div>
                <div className="u">%</div>
                <div className="sub">{ok ? `${fmt(eff.pct * 10, 1)} ‰` : ""}</div>
              </div>
              <div className="sc-ro">
                <div className="k">斜率</div>
                <div className="v" style={{ fontSize: 21 }}>
                  {ok ? (isFinite(eff.ratioN) ? `1:${fmt(eff.ratioN, 1)}` : "水平") : "—"}
                </div>
                <div className="u">rise : run</div>
                <div className="sub">&nbsp;</div>
              </div>
              <div className="sc-ro">
                <div className="k">角度</div>
                <div className="v">{ok ? fmt(eff.deg, 2) : "—"}</div>
                <div className="u">deg °</div>
                <div className="sub">&nbsp;</div>
              </div>
            </div>

            {/* 求得 / 斜距 */}
            {ok && (
              <div className="sc-result">
                {eff.solved ? (
                  <>
                    <span className="lab">求得 {eff.solved.key === "rise" ? "前後高差" : "水平長度"}</span>
                    <span className="val">{convU(eff.solved.val)}
                      <span className="sub2">斜距 {convU(eff.slope)}</span>
                    </span>
                  </>
                ) : (
                  <>
                    <span className="lab">斜距 slope length</span>
                    <span className="val">{convU(eff.slope)}</span>
                  </>
                )}
              </div>
            )}

            <div className="sc-figsel">
              <span className="sc-figselLab">圖示</span>
              <div className="sc-figrow">
                {FIGURES.map((f) => (
                  <button key={f.id} className="sc-figbtn" data-on={figure === f.id}
                    onClick={() => setFigure(f.id)} title={f.label} aria-label={f.label}>
                    {f.id === "none"
                      ? <span style={{ fontSize: 12 }}>無</span>
                      : <svg className="sc-figico" viewBox="-42 -52 96 62" aria-hidden="true">{renderFigure(f.id)}</svg>}
                  </button>
                ))}
              </div>
            </div>

            <div className="sc-figwrap">
              {fig ? (
                <svg className="sc-fig" viewBox={`0 0 ${fig.W} ${fig.H}`} role="img"
                  aria-label={`坡度剖面圖 ${fmt(eff.deg, 1)} 度`}>
                  {[0.25, 0.5, 0.75].map((f) => (
                    <line key={f} className="grid" x1={fig.ax} x2={fig.W - 20}
                      y1={fig.ay - (fig.ay - 20) * f} y2={fig.ay - (fig.ay - 20) * f} />
                  ))}
                  <line className="base" x1={fig.ax} y1={fig.ay} x2={fig.bx} y2={fig.by} />
                  <line className="riseL" x1={fig.bx} y1={fig.by} x2={fig.cx} y2={fig.cy} />
                  <line className="hyp" x1={fig.ax} y1={fig.ay} x2={fig.cx} y2={fig.cy} />
                  <path className="arc" d={fig.arc} />
                  <text className="ang" x={fig.ax + 34} y={fig.ay - 8}>{fmt(eff.deg, 1)}°</text>
                  <text className="dim" x={(fig.ax + fig.bx) / 2} y={fig.ay + 16} textAnchor="middle">
                    水平 {convU(eff.run)}
                  </text>
                  <text className="dim" x={fig.cx + 6} y={(fig.by + fig.cy) / 2} dominantBaseline="middle">
                    高差 {convU(eff.rise)}
                  </text>
                  {figure !== "none" && (
                    <g transform={`translate(${(fig.ax + fig.cx) / 2},${(fig.ay + fig.cy) / 2}) rotate(${-eff.deg}) scale(0.8)`}>
                      {renderFigure(figure)}
                    </g>
                  )}
                </svg>
              ) : (
                <svg className="sc-fig" viewBox="0 0 360 180" aria-hidden="true">
                  <line className="grid" x1="30" y1="150" x2="340" y2="150" />
                  <text x="180" y="90" textAnchor="middle" className="dim">
                    {mode === "forward" ? "輸入長度與高差" : "輸入目標坡度與已知邊"}
                  </text>
                </svg>
              )}
            </div>
          </div>
        </div>

        {/* 法規提醒 */}
        <div className="sc-regs">
          <p className="sc-eyebrow">法規提醒 · Reference（以水平投影長計）</p>
          <div className="sc-cards">
            <div className="sc-card">
              <div className="top">
                <div>
                  <div className="name">洩水坡度</div>
                  <div className="src">建築技術規則建築設備編 · 常用 1/100～1/50</div>
                </div>
                {regs ? <Pill s={regs.drainOver ? "warn" : regs.drain.s}>{regs.drain.label}</Pill> : <Pill s="info">—</Pill>}
              </div>
              <div className="thr">下限：小洩 1/100 (1%)　濕區/屋頂 大洩 1/50 (2%)</div>
              {regs && (
                <div className="sc-conv">
                  在此長 {convU(regs.run)}，最小高差：<br />
                  小洩 1/100 = {convU(regs.run / 100)}　大洩 1/50 = {convU(regs.run / 50)}
                </div>
              )}
              {regs && regs.drainOver && (
                <div className="sc-note">坡度偏陡，地坪排水過快易留污、施工不易，一般地坪不建議。</div>
              )}
            </div>

            <div className="sc-card">
              <div className="top">
                <div>
                  <div className="name">車道坡道</div>
                  <div className="src">建築技術規則建築設計施工編 §61</div>
                </div>
                {regs ? <Pill s={regs.ramp.s}>{regs.ramp.label}</Pill> : <Pill s="info">—</Pill>}
              </div>
              <div className="thr">上限：坡度不得超過 1:6 (≈16.67%)</div>
              {regs && <div className="sc-conv">在此長 {convU(regs.run)}，最大高差 1:6 = {convU(regs.run / 6)}</div>}
              <div className="sc-note">表面須粗面防滑；內側曲線半徑 ≥5m；起訖處另需緩衝考量。</div>
            </div>

            <div className="sc-card">
              <div className="top">
                <div>
                  <div className="name">無障礙坡道</div>
                  <div className="src">建築物無障礙設施設計規範 206</div>
                </div>
                {regs ? <Pill s={regs.acc.s}>{regs.acc.label}</Pill> : <Pill s="info">—</Pill>}
              </div>
              <div className="thr">上限：坡度不得大於 1/12 (8.33%)</div>
              {regs && <div className="sc-conv">在此長 {convU(regs.run)}，最大高差 1/12 = {convU(regs.run / 12)}</div>}
              <div className="sc-note">
                高差&lt;20cm 得放寬：≤20cm→1/10、≤5cm→1/5、≤3cm→1/2。
                每高差 75cm 需設中間平台，平台坡度 ≤1/50。
              </div>
            </div>

            <div className="sc-card">
              <div className="top">
                <div>
                  <div className="name">滑雪難度（參考）</div>
                  <div className="src">國際慣例概略分級，各雪場略異</div>
                </div>
                {regs ? <Pill s="info">{regs.ski}</Pill> : <Pill s="info">—</Pill>}
              </div>
              <div className="thr">綠 ≤25%　藍 25–40%　黑 40–60%　雙黑 &gt;60%</div>
              {ok && <div className="sc-conv">目前 {fmt(eff.pct, 1)}%　≈ {fmt(eff.deg, 1)}°</div>}
            </div>
          </div>
        </div>

        <p className="sc-foot">
          坡度 = 高差 ÷ 水平投影長；斜率以 1:n 表示（rise:run）；‰ = 每千分之。
          正算輸入「斜距」時會自動換算水平長；反算給定目標坡度＋已知一邊即反推另一邊。
          法規數值為現行常見規定之整理，僅供快速研判，實際設計與查驗請以最新條文與主管機關認定為準。
        </p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SlopeCalculator />);

  </script>
</body>
</html>
